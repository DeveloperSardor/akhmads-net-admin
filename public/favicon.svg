<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark Circle Background -->
  <circle cx="16" cy="16" r="16" fill="url(#bg)" />
  
  <!-- Outer Rotating Ring (static representation for favicon) -->
  <circle cx="16" cy="16" r="14" stroke="url(#ring1)" stroke-width="2" fill="none" stroke-linecap="round" stroke-dasharray="22 66" />
  
  <!-- Inner Rotating Ring (static representation) -->
  <circle cx="16" cy="16" r="11" stroke="url(#ring2)" stroke-width="2" fill="none" stroke-linecap="round" stroke-dasharray="17 52" />
  
  <!-- X Mark -->
  <line x1="10" y1="10" x2="22" y2="22" stroke="url(#xgrad)" stroke-width="2.5" stroke-linecap="round" />
  <line x1="22" y1="10" x2="10" y2="22" stroke="url(#xgrad)" stroke-width="2.5" stroke-linecap="round" />
  
  <!-- Definitions -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="40%" stop-color="#0f0f2a" />
      <stop offset="100%" stop-color="#070715" />
    </radialGradient>
    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8f2fff" />
      <stop offset="100%" stop-color="#4b00ff" />
    </linearGradient>
    <linearGradient id="ring2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4b00ff" />
      <stop offset="100%" stop-color="#8f2fff" />
    </linearGradient>
    <linearGradient id="xgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6a00ff" />
      <stop offset="100%" stop-color="#b84dff" />
    </linearGradient>
  </defs>
</svg>
